name: auto run

on:
  schedule:
    - cron: '0 2 * * *' # 每天 UTC 2:00（北京时间 10:00）
  workflow_dispatch:
    inputs:
      enable_video:
        description: '是否开启录屏'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force_run:
        description: '强制所有账号执行，忽略 next_run_account*.txt'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: acl-renew
  cancel-in-progress: false

jobs:
  renew:
    name: 执行续期检测
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    timeout-minutes: 40

    env:
      PYTHONUNBUFFERED: '1'
      PROXY_SERVER: socks5://127.0.0.1:10808
      RENEW_THRESHOLD_DAYS: '2'

    steps:
      - name: 拉取当前仓库（B）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取私库脚本（A）
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private_code
          fetch-depth: 1

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 检查私库文件
        shell: bash
        run: |
          set -euo pipefail
          test -f private_code/renew.py
          test -f private_code/requirements.txt
          echo "私库脚本检查通过"

      - name: 手动强制执行时清理账号状态文件
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.force_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -f next_run_account*.txt
          echo "已清理 next_run_account*.txt，本次将强制所有账号执行"

      - name: 安装系统依赖
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl wget unzip jq ca-certificates gnupg lsb-release

      - name: 安装 Python 依赖
        shell: bash
        run: |
          set -euo pipefail
          pip install -r private_code/requirements.txt
          playwright install chromium --with-deps

      - name: 安装并启动 Cloudflare WARP SOCKS5
        env:
          WARP_PLUS_LICENSE: ${{ secrets.WARP_PLUS_LICENSE }}
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

          sudo warp-cli --accept-tos registration new || true
          if [[ -n "${WARP_PLUS_LICENSE:-}" ]]; then
            sudo warp-cli --accept-tos registration license "$WARP_PLUS_LICENSE" || true
          fi

          sudo warp-cli --accept-tos mode proxy
          sudo warp-cli --accept-tos proxy port 10808
          sudo warp-cli --accept-tos connect

          for i in {1..20}; do
            STATUS="$(sudo warp-cli --accept-tos status || true)"
            echo "$STATUS"
            if echo "$STATUS" | grep -qi "Connected"; then
              break
            fi
            sleep 2
          done

          echo "直连 IP："
          curl -s --max-time 10 ifconfig.me || true
          echo ""

          echo "代理 IP："
          curl -s --max-time 15 --socks5-hostname 127.0.0.1:10808 ifconfig.me || true
          echo ""

      - name: 运行私库 renew.py
        env:
          ACCOUNT1_EMAIL: ${{ secrets.ACCOUNT1_EMAIL }}
          ACCOUNT1_PASSWORD: ${{ secrets.ACCOUNT1_PASSWORD }}
          ACCOUNT2_EMAIL: ${{ secrets.ACCOUNT2_EMAIL }}
          ACCOUNT2_PASSWORD: ${{ secrets.ACCOUNT2_PASSWORD }}

          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

          ENABLE_VIDEO: ${{ github.event.inputs.enable_video || 'false' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}

          PROXY_SERVER: socks5://127.0.0.1:10808
          RENEW_THRESHOLD_DAYS: '2'
        shell: bash
        run: |
          set -euo pipefail
          python private_code/renew.py 2>&1 | tee renew.log

      - name: 打印生成文件列表
        if: always()
        shell: bash
        run: |
          echo "==== next_run_account files ===="
          ls -la next_run_account*.txt 2>/dev/null || true
          echo "==== screenshots files ===="
          find screenshots -maxdepth 2 -type f 2>/dev/null | sort || true

      - name: 提交账号状态文件到当前仓库（B）
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add next_run_account*.txt 2>/dev/null || true

          git diff --cached --quiet && {
            echo "账号状态文件无变更，无需提交。"
            exit 0
          }

          git commit -m "chore: update account next_run files"
          git push

      - name: 上传截图、日志和账号状态文件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acl-debug
          path: |
            screenshots/
            renew.log
            next_run_account*.txt
          if-no-files-found: ignore
          retention-days: 3

      - name: 删除当前 workflow 的旧 runs（保留最近 2 个）
        if: always() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          WORKFLOW_ID=$(gh api repos/${{ github.repository }}/actions/workflows \
            --jq '.workflows[] | select(.name == "${{ github.workflow }}") | .id')
          echo "Workflow ID: $WORKFLOW_ID"

          gh api "repos/${{ github.repository }}/actions/workflows/${WORKFLOW_ID}/runs" \
            --paginate \
            --jq '.workflow_runs[2:][] | .id' \
          | while read -r id; do
              echo "Deleting run $id"
              gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$id"
            done
